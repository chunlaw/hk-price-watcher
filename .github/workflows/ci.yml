name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Regenerate a small mock dataset and digest it (no network, no model) so
      # the typecheck + production build are exercised on every PR.
      - run: npm run data:mock
      - run: npm run data:build:mock
      - run: npm run build
